name: EAS Build (Android/iOS)

# Builds the app on Expo's EAS cloud servers.
# Runs automatically on every push to main, and can be triggered manually
# from the Actions tab (where you can pick the platform and profile).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options:
          - android
          - ios
          - all
        default: android
      profile:
        description: EAS build profile
        type: choice
        options:
          - preview
          - production
          - development
        default: preview

# Avoid stacking up concurrent builds for the same branch.
concurrency:
  group: eas-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build on EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS / Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build on EAS
        run: |
          eas build \
            --platform ${{ github.event.inputs.platform || 'android' }} \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
